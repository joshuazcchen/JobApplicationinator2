name: Build

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-latest
                      platform: mac
                      artifact: release-mac
                    - os: windows-latest
                      platform: win
                      artifact: release-win

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: node20
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: dependencies
              run: npm ci

            - name: TypeScript
              run: npm run build

            - name: electron
              run: npm run dist:${{ matrix.platform }}
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.artifact }}
                  path: release/
                  if-no-files-found: warn
                  retention-days: 30

    release:
        needs: build
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v8

            - name: Create release
              uses: softprops/action-gh-release@v3
              with:
                  draft: true
                  generate_release_notes: true
                  files: |
                      release-mac/**/*
                      release-win/**/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check
