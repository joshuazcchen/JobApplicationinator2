name: License Header Check

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-headers:
    name: verify headers
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7

    - name: scan files
      run: |
        error_found=0

        files=$(find . -type f \( -name "*.ts" -o -name "*.js" -o -name "*.tsx" -o -name "*.jsx" -o -name "*.css" -o -name "*.html" \) ! -path "*/node_modules/*" ! -path "*/dist/*" ! -path "*/build/*" ! -path "*/.git/*")

        for file in $files; do
          if ! head -n 5 "$file" | grep -q "GPL-3.0-or-later"; then
            echo "::error file=$file,line=1::missing GPLv3 SPDX header"
            error_found=1
          fi
        done

        if [ "$error_found" -ne 0 ]; then
          echo "missing GPLv3 SPDX header in one or more files"
          exit 1
        fi

        echo "all files tagged with SPDX identifier"
