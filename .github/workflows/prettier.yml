name: Prettier

on:
	push:
		branches: [ master ]
	pull_request:
		branches: [ master ]

jobs:
	prettier-check:
		runs-on: ubuntu-latest

		steps:
			- name: Checkout
				uses: actions/checkout@v7

			- name: Set up Node.js
				uses: actions/setup-node@v6
				with:
					node-index: '22'
					cache: 'npm'

			- name: Install dependencies
				run: npm ci

			- name: Run Prettier Check
				run: npm run format:check
