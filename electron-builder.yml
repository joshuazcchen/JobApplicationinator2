appId: com.yourname.jobapplicationinator
productName: JobApplicationinator

directories:
  output: release

files:
  - dist/**/*
  - package.json

extraResources:
  - from: assets/
    to: assets/

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
