<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<style>
			body {
				margin: 0;
				height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 16px;
				background: #1a1a2e;
				font-family: 'Comic Sans', 'Comic Sans MS', sans-serif;
				-webkit-app-region: drag;
			}
			.spinner {
				width: 32px;
				height: 32px;
				border: 3px solid rgba(255, 255, 255, 0.15);
				border-top-color: #5f8eff;
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
			}
			.label {
				color: #cfdfe0;
				font-size: 13px;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
		</style>
	</head>
	<body>
		<div class="spinner"></div>
		<div class="label">temporary</div>
	</body>
</html>
